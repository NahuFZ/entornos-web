<!DOCTYPE html>
<!-- 
    1. No aclara que los asteriscos indica que es obligatorio.
    2. La selección mútliple requiere que se seleccione el primer elemento (limitación de HTML)
    3. No controla que el formato de calle y número se respete. 
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Formulario genérico de pedidos con diseño responsive y validación nativa.">
  <title>Formulario de Pedido | Sistema de Gestión | Gemini Fast</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="container">
    <header>
      <h1>Formulario de Pedido</h1>
      <p>Por favor, complete los siguientes campos para procesar su solicitud.</p>
    </header>

    <form action="#" method="post" class="order-form">
      
      <fieldset>
        <legend>Datos del Cliente</legend>
        
        <div class="form-group">
          <label for="name">Nombre Completo <span class="required" aria-hidden="true">*</span></label>
          <input type="text" id="name" name="name" maxlength="100" required 
                 placeholder="Ej: Juan Pérez" aria-required="true">
        </div>

        <div class="form-group">
          <label for="email">Correo Electrónico <span class="required" aria-hidden="true">*</span></label>
          <input type="email" id="email" name="email" required 
                 placeholder="usuario@ejemplo.com" aria-required="true">
        </div>

        <div class="form-group">
          <label for="phone">Teléfono <span class="required" aria-hidden="true">*</span></label>
          <input type="text" id="phone" name="phone" maxlength="20" required 
                 pattern="[0-9]+" title="Solo se permiten números." 
                 placeholder="Solo números" aria-required="true">
        </div>

        <div class="form-group">
          <label for="address">Dirección <span class="required" aria-hidden="true">*</span></label>
          <input type="text" id="address" name="address" maxlength="250" required 
                 placeholder="Calle y número" aria-required="true">
        </div>

        <div class="form-group">
          <label for="city">Localidad <span class="required" aria-hidden="true">*</span></label>
          <input type="text" id="city" name="city" maxlength="100" required 
                 placeholder="Ciudad / Localidad" aria-required="true">
        </div>
      </fieldset>

      <fieldset>
        <legend>Punto de Retiro</legend>
        <div class="form-group">
          <label for="branch">Seleccione una Sucursal <span class="required" aria-hidden="true">*</span></label>
          <select id="branch" name="branch" required aria-required="true">
            <option value="" disabled selected>-- Elija una opción --</option>
            <optgroup label="Zona Norte">
              <option value="norte-1">Sucursal Olivos</option>
              <option value="norte-2">Sucursal San Isidro</option>
            </optgroup>
            <optgroup label="Zona Centro">
              <option value="centro-1">Sucursal Microcentro</option>
              <option value="centro-2">Sucursal Almagro</option>
            </optgroup>
            <optgroup label="Zona Sur">
              <option value="sur-1">Sucursal Avellaneda</option>
              <option value="sur-2">Sucursal Lomas</option>
            </optgroup>
          </select>
        </div>
      </fieldset>

      <fieldset>
        <legend>Selección de Productos (Mínimo uno)</legend>
        <div class="checkbox-group" role="group" aria-labelledby="products-label">
          <p id="products-label" class="label-style">Productos disponibles <span class="required">*</span></p>
          
          <label class="checkbox-container">
            <input type="checkbox" name="product" value="prod-1" required> Producto A
          </label>
          <label class="checkbox-container">
            <input type="checkbox" name="product" value="prod-2"> Producto B
          </label>
          <label class="checkbox-container">
            <input type="checkbox" name="product" value="prod-3"> Producto C
          </label>
          <label class="checkbox-container">
            <input type="checkbox" name="product" value="prod-4"> Producto D
          </label>
          <label class="checkbox-container">
            <input type="checkbox" name="product" value="prod-5"> Producto E
          </label>
        </div>
      </fieldset>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Enviar Pedido</button>
        <button type="reset" class="btn btn-secondary">Limpiar Formulario</button>
      </div>
    </form>
  </main>

</body>
</html>
