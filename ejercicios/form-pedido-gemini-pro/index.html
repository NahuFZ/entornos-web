<!DOCTYPE html>
<!-- 
    1. La interfaz es innecesariamente grande.
    2. No controla que el formato de calle y número se respete. 
-->
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Formulario genérico para la realización de pedidos en línea.">
  <title>Realizar un Pedido | Gemini Pro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Formulario de Pedido</h1>
  </header>

  <main>
    <form action="#" method="POST">
      <p class="form-instructions">
        Los campos marcados con un asterisco (<span class="required-indicator" aria-hidden="true">*</span>) son obligatorios.
      </p>

      <fieldset>
        <legend>Datos del Solicitante</legend>

        <div class="form-group">
          <label for="name">Nombre completo <span class="required-indicator" aria-hidden="true">*</span></label>
          <input type="text" id="name" name="name" required maxlength="100" autocomplete="name">
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico <span class="required-indicator" aria-hidden="true">*</span></label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="phone">Teléfono (solo números) <span class="required-indicator" aria-hidden="true">*</span></label>
          <input type="tel" id="phone" name="phone" required maxlength="20" pattern="[0-9]+" title="Por favor, ingrese únicamente números." autocomplete="tel">
        </div>

        <div class="form-group">
          <label for="address">Dirección <span class="required-indicator" aria-hidden="true">*</span></label>
          <input type="text" id="address" name="address" required maxlength="250" autocomplete="street-address">
        </div>

        <div class="form-group">
          <label for="locality">Localidad <span class="required-indicator" aria-hidden="true">*</span></label>
          <input type="text" id="locality" name="locality" required maxlength="100" autocomplete="address-level2">
        </div>
      </fieldset>

      <fieldset>
        <legend>Retiro del Pedido</legend>
        
        <div class="form-group">
          <label for="branch">Sucursal <span class="required-indicator" aria-hidden="true">*</span></label>
          <select id="branch" name="branch" required>
            <option value="" disabled selected>Seleccione una sucursal...</option>
            <optgroup label="Zona Norte">
              <option value="zn-1">Sucursal Norte 1</option>
              <option value="zn-2">Sucursal Norte 2</option>
              <option value="zn-3">Sucursal Norte 3</option>
            </optgroup>
            <optgroup label="Zona Centro">
              <option value="zc-1">Sucursal Centro 1</option>
              <option value="zc-2">Sucursal Centro 2</option>
            </optgroup>
            <optgroup label="Zona Sur">
              <option value="zs-1">Sucursal Sur 1</option>
              <option value="zs-2">Sucursal Sur 2</option>
            </optgroup>
          </select>
        </div>
      </fieldset>

      <fieldset>
        <legend>Productos <span class="required-indicator" aria-hidden="true">*</span></legend>
        <p class="fieldset-help">Seleccione uno o más productos de la lista (utilice Ctrl/Cmd para selección múltiple).</p>
        
        <div class="form-group">
          <label for="products" class="visually-hidden">Selección de productos</label>
          <select id="products" name="products[]" multiple required size="5" class="product-select">
            <option value="prod-1">Producto Genérico 01</option>
            <option value="prod-2">Producto Genérico 02</option>
            <option value="prod-3">Producto Genérico 03</option>
            <option value="prod-4">Producto Genérico 04</option>
            <option value="prod-5">Producto Genérico 05</option>
          </select>
        </div>
      </fieldset>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Confirmar Pedido</button>
        <button type="reset" class="btn btn-secondary">Resetear Datos</button>
      </div>
    </form>
  </main>
</body>
</html>
